# Server Configuration
# Dynamically bind to PORT environment variable if present, defaulting to 8081 locally
server.port=${PORT:8081}

# Spring Data MongoDB Configuration
# Connection URI externalized to the MONGODB_URI environment variable for security
spring.data.mongodb.uri=${MONGODB_URI}
# Target database name to connect to on MongoDB Atlas
spring.data.mongodb.database=vitallink

# JWT Configuration
# Configurable JWT Secret key (overridable in production via JWT_SECRET)
vitallink.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# Expiry duration: 1 day in milliseconds (24 * 60 * 60 * 1000 = 86400000)
vitallink.jwt.expiration=86400000

# CORS Configuration
# List of allowed origins for CORS, overridable in production via CORS_ALLOWED_ORIGINS
vitallink.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173,http://localhost:3000}

# Enable Spring Data MongoDB repositories auto configuration
spring.data.mongodb.repositories.enabled=true

# Request logging details
logging.level.org.springframework.web=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
